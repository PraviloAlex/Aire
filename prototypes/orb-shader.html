<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Aire — орб (шейдер)</title>
<style>
  :root{--panel:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--text:#e8eef5;--muted:#7d8896;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#04060c;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .app{max-width:430px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:18px 20px 22px;}
  .top{display:flex;align-items:center;justify-content:space-between;}
  .iconbtn{width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);background:var(--panel);
    color:var(--text);font-size:18px;display:grid;place-items:center;}
  .title{text-align:center;}
  .title h1{margin:0;font-size:22px;font-weight:600;}
  .pattern{margin-top:3px;font-size:14px;color:var(--muted);letter-spacing:3px;}
  .timer{margin:16px auto 0;display:flex;flex-direction:column;align-items:center;
    padding:8px 18px;border:1px solid var(--bd);background:var(--panel);border-radius:16px;}
  .timer .t{font-size:18px;font-variant-numeric:tabular-nums;}
  .timer .l{font-size:11px;color:var(--muted);}
  .stage{position:relative;flex:1;min-height:320px;margin:6px 0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .phase{text-align:center;margin-top:2px;}
  .phase .ph{font-size:18px;font-weight:600;letter-spacing:.5px;}
  .phase .sec{font-size:64px;font-weight:300;line-height:1;margin:4px 0 2px;font-variant-numeric:tabular-nums;}
  .phase .hint{font-size:13px;color:var(--muted);}
  .round{margin:14px auto 0;font-size:13px;color:var(--muted);text-align:center;}
  .scenarios{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
  .scn{padding:9px 4px;border-radius:13px;border:1px solid var(--bd);background:var(--panel);
    color:var(--muted);font-size:12px;text-align:center;}
  .scn.active{color:var(--text);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07);}
  details{margin-top:14px;border:1px solid var(--bd);border-radius:14px;background:var(--panel);}
  summary{padding:11px 14px;font-size:13px;color:var(--muted);list-style:none;}
  summary::-webkit-details-marker{display:none;}
  .sliders{padding:4px 14px 14px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
  .row label{width:104px;flex:none;}
  .row input[type=range]{flex:1;accent-color:#46d6c4;}
  .row .val{width:40px;text-align:right;color:var(--text);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="iconbtn">‹</div>
    <div class="title"><h1 id="scnName">Собраться</h1><div class="pattern" id="pattern">4 · 2 · 4</div></div>
    <div class="iconbtn">⋯</div>
  </div>
  <div class="timer"><div class="t" id="remain">2:00</div><div class="l">осталось</div></div>
  <div class="stage"><canvas id="cv"></canvas></div>
  <div class="phase">
    <div class="ph" id="phaseLabel">Вдох</div>
    <div class="sec" id="secNum">4</div>
    <div class="hint" id="hint">через нос</div>
  </div>
  <div class="round" id="round">цикл 1 / 6</div>
  <div class="scenarios" id="scenarios"></div>
  <details>
    <summary>⚙︎ Тонкая настройка</summary>
    <div class="sliders">
      <div class="row"><label>Деформация края</label><input id="sAmp" type="range" min="0" max="100" value="50"><span class="val" id="vAmp">—</span></div>
      <div class="row"><label>Скорость потока</label><input id="sSpeed" type="range" min="0" max="100" value="50"><span class="val" id="vSpeed">—</span></div>
      <div class="row"><label>Свечение</label><input id="sGlow" type="range" min="0" max="100" value="50"><span class="val" id="vGlow">—</span></div>
      <div class="row"><label>Детализация нитей</label><input id="sDetail" type="range" min="0" max="100" value="50"><span class="val" id="vDetail">—</span></div>
    </div>
  </details>
</div>

<script>
/* ============================================================
   Aire — орб на 2D-фрагментном шейдере (domain-warped fbm).
   Детерминированно: все uniform'ы зависят от времени и сценария.
   Без датчиков. Один квад -> легко тянет 60fps на Android.
   ============================================================ */
const cv=document.getElementById('cv');
const gl=cv.getContext('webgl',{premultipliedAlpha:false,antialias:true});
if(!gl){document.body.innerHTML='<p style="padding:40px;color:#fff">WebGL недоступен в этом браузере.</p>';}

const VS=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
const FS=`
precision highp float;
uniform vec2 uRes;
uniform float uTime,uScale,uBright,uChaos,uAmp,uGlow,uDetail,uRound;
uniform vec3 uC1,uC2,uC3;
float hash(vec2 p){p=fract(p*vec2(123.34,345.45));p+=dot(p,p+34.345);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
mat2 rot(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<6;i++){v+=a*noise(p);p=rot(.6)*p*2.+0.7;a*=.5;}return v;}
void main(){
  vec2 uv=(gl_FragCoord.xy-0.5*uRes)/min(uRes.x,uRes.y);
  float t=uTime;
  // ---- силуэт: гладкий волнистый, с запасом до краёв ----
  float baseR=0.38*uScale;
  float ang=atan(uv.y,uv.x);
  float wob=uAmp*0.030*sin(ang*2.0+t*0.35)
           +uAmp*0.020*sin(ang*3.0-t*0.50)
           +uChaos*uAmp*0.013*sin(ang*4.0+t*0.70);
  float R=baseR+wob;
  float rad=length(uv);
  float d=rad/R;
  float dc=min(d,1.0);
  float z=sqrt(max(0.0,1.0-dc*dc));
  // ---- поток (двойной domain-warp) ----
  vec2 sp=uv/R;
  vec2 q=vec2(fbm(sp*1.4+vec2(0.,t*0.09)),fbm(sp*1.4+vec2(4.3,t*0.07)));
  vec2 r2=vec2(fbm(sp*1.4+1.6*q+t*0.05*uChaos),
               fbm(sp*1.4+1.6*q+vec2(7.0,2.0)-t*0.045*uChaos));
  float flow=fbm(sp*1.4+(1.2+uDetail)*r2);
  // ---- тёмная полупрозрачная сердцевина ----
  vec3 col=uC3*0.22;
  col+=uC2*smoothstep(0.75,0.0,d)*0.16;
  // ---- светящаяся оболочка (fresnel) с потоком ----
  float shell=pow(1.0-z,2.2);
  col+=mix(uC2,uC1,flow)*shell*(0.35+0.95*flow)*1.05*uBright;
  // ---- тонкий яркий ободок ----
  float rim=smoothstep(0.80,0.99,d)*smoothstep(1.05,0.92,d);
  col+=uC1*rim*(0.4+0.6*flow)*uBright;
  col*=uBright;
  // ---- узкое внешнее свечение ----
  float glow=smoothstep(1.28,1.0,d)*uGlow*0.28*uBright;
  vec3 bg=vec3(0.011,0.017,0.032);
  float alpha=clamp(max(smoothstep(1.04,0.99,d),glow),0.0,1.0);
  vec3 outCol=col+uC2*glow*0.7;
  gl_FragColor=vec4(mix(bg,outCol,alpha),1.0);
}`;
function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VS));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const loc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
const U=n=>gl.getUniformLocation(prog,n);
const u={res:U('uRes'),time:U('uTime'),scale:U('uScale'),bright:U('uBright'),
  chaos:U('uChaos'),amp:U('uAmp'),glow:U('uGlow'),detail:U('uDetail'),
  c1:U('uC1'),c2:U('uC2'),c3:U('uC3')};

function hex(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255];}

/* ---- сценарии ---- */
const SC={
 focus:{name:"Собраться",pattern:[4,2,4],rounds:6,speed:0.9,amp:0.7,chaos:0.3,
   c1:hex("d6fbff"),c2:hex("33c3b4"),c3:hex("06343a"),dim:1.0},
 calm:{name:"Успокоиться",pattern:[4,0,6],rounds:6,speed:1.3,amp:1.0,chaos:0.85,
   c1:hex("e3f1ff"),c2:hex("4f93e6"),c3:hex("0a2748"),dim:1.0},
 sleep:{name:"Уснуть",pattern:[4,7,8],rounds:5,speed:0.45,amp:0.6,chaos:0.3,
   c1:hex("ffe9c2"),c2:hex("d49a4e"),c3:hex("2a1808"),dim:0.78},
 restore:{name:"Восстановиться",pattern:[5,1,5],rounds:6,speed:0.8,amp:0.78,chaos:0.5,
   c1:hex("eafff6"),c2:hex("57c79a"),c3:hex("1f3a2c"),dim:0.92},
};
const ORDER=["focus","calm","sleep","restore"];
const PH=["inhale","hold","exhale"],PH_RU={inhale:"Вдох",hold:"Пауза",exhale:"Выдох"};
const HINTS={inhale:"через нос",hold:"удержи мягко",exhale:"медленно, расслабь плечи"};
let key="focus", user={amp:1,speed:1,glow:1,detail:1}, start=performance.now();

const $=id=>document.getElementById(id);
function bind(id,vid,fmt,set){const s=$(id),v=$(vid);const f=()=>{v.textContent=fmt(set(+s.value));};s.oninput=f;f();}
bind('sAmp','vAmp',r=>r.toFixed(2),x=>user.amp=0.3+x/100*1.5);
bind('sSpeed','vSpeed',r=>r.toFixed(2),x=>user.speed=0.3+x/100*1.7);
bind('sGlow','vGlow',r=>r.toFixed(2),x=>user.glow=0.2+x/100*1.6);
bind('sDetail','vDetail',r=>r.toFixed(2),x=>user.detail=x/100*2.0);

const wrap=$("scenarios");
ORDER.forEach(k=>{const b=document.createElement('div');b.className='scn'+(k===key?' active':'');
  b.textContent=SC[k].name;b.onclick=()=>{key=k;[...wrap.children].forEach(e=>e.classList.remove('active'));
  b.classList.add('active');apply();start=performance.now();};wrap.appendChild(b);});
function apply(){$("scnName").textContent=SC[key].name;$("pattern").textContent=SC[key].pattern.join(" · ");}
apply();

const lerp=(a,b,t)=>a+(b-a)*t, easeIO=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function cycle(now){const s=SC[key],d=s.pattern,len=d[0]+d[1]+d[2],total=len*s.rounds;
  let el=((now-start)/1000)%total, ri=Math.floor(((now-start)/1000)/len)%s.rounds, ti=el%len, ph,pd,pe;
  if(ti<d[0]){ph=0;pd=d[0];pe=ti;}else if(ti<d[0]+d[1]){ph=1;pd=d[1];pe=ti-d[0];}else{ph=2;pd=d[2];pe=ti-d[0]-d[1];}
  return {ph,p:pd>0?pe/pd:1,pd,pe,ri,rounds:s.rounds,remain:total-el};}

function resize(){const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=cv.clientWidth*dpr,h=cv.clientHeight*dpr;
  if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;gl.viewport(0,0,w,h);}}

function frame(now){
  resize();
  const s=SC[key],ci=cycle(now);
  const t=(now/1000)*s.speed*user.speed;
  let scale,bright,ampMul;
  if(ci.ph===0){const e=easeIO(ci.p);scale=lerp(0.92,1.12,e);bright=lerp(0.72,1.0,e);ampMul=1.0;}
  else if(ci.ph===1){scale=1.12+0.006*Math.sin(t*2);bright=1.0;ampMul=0.5;}
  else{const e=easeIO(ci.p);scale=lerp(1.12,0.92,e);bright=lerp(1.0,0.64,e);ampMul=lerp(1.0,0.45,e);}
  bright*=s.dim;
  gl.uniform2f(u.res,cv.width,cv.height);
  gl.uniform1f(u.time,t);
  gl.uniform1f(u.scale,scale);
  gl.uniform1f(u.bright,bright);
  gl.uniform1f(u.chaos,s.chaos);
  gl.uniform1f(u.amp,s.amp*ampMul*user.amp);
  gl.uniform1f(u.glow,user.glow);
  gl.uniform1f(u.detail,user.detail);
  gl.uniform3fv(u.c1,s.c1);gl.uniform3fv(u.c2,s.c2);gl.uniform3fv(u.c3,s.c3);
  gl.drawArrays(gl.TRIANGLES,0,3);
  // текст
  $("phaseLabel").textContent=PH_RU[PH[ci.ph]];
  $("hint").textContent=HINTS[PH[ci.ph]];
  $("secNum").textContent=ci.pd>0?Math.max(1,Math.ceil(ci.pd-ci.pe)):"—";
  $("round").textContent=`цикл ${ci.ri+1} / ${ci.rounds}`;
  const m=Math.floor(ci.remain/60),sec=Math.floor(ci.remain%60);
  $("remain").textContent=`${m}:${sec<10?'0':''}${sec}`;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
