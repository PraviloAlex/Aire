<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Aire — орб (пререндер-петля)</title>
<style>
  :root{--panel:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--text:#e8eef5;--muted:#7d8896;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#04060c;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .app{max-width:430px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:18px 20px 22px;}
  .top{display:flex;align-items:center;justify-content:space-between;}
  .iconbtn{width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);background:var(--panel);
    color:var(--text);font-size:18px;display:grid;place-items:center;}
  .title{text-align:center;}
  .title h1{margin:0;font-size:22px;font-weight:600;}
  .pattern{margin-top:3px;font-size:14px;color:var(--muted);letter-spacing:3px;}
  .timer{margin:16px auto 0;display:flex;flex-direction:column;align-items:center;
    padding:8px 18px;border:1px solid var(--bd);background:var(--panel);border-radius:16px;}
  .timer .t{font-size:18px;font-variant-numeric:tabular-nums;}
  .timer .l{font-size:11px;color:var(--muted);}
  /* ---- сцена ---- */
  .stage{position:relative;flex:1;min-height:320px;margin:6px 0;display:grid;place-items:center;
    isolation:isolate;overflow:hidden;}
  .breath{position:relative;width:74%;aspect-ratio:1;display:grid;place-items:center;will-change:transform,filter;}
  .glow{position:absolute;width:115%;aspect-ratio:1;border-radius:50%;filter:blur(38px);opacity:.5;z-index:0;}
  /* нейтральный (серый) орб: видео ИЛИ плейсхолдер */
  .orb{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:1;}
  .placeholder{position:absolute;inset:0;z-index:1;border-radius:50%;
    background:
      radial-gradient(40% 38% at 44% 40%, #fff 0%, #cfcfcf 22%, #6f6f6f 52%, #2a2a2a 74%, #111 100%);
    box-shadow:inset 0 0 40px rgba(0,0,0,.6);
    animation:wob 9s ease-in-out infinite;}
  @keyframes wob{
    0%,100%{border-radius:52% 48% 46% 54%/50% 52% 48% 50%;}
    50%{border-radius:47% 53% 52% 48%/54% 47% 53% 46%;}
  }
  /* перекраска нейтрального орба в цвет состояния */
  .tint{position:absolute;inset:0;z-index:2;mix-blend-mode:color;pointer-events:none;}
  .sheen{position:absolute;inset:0;z-index:3;mix-blend-mode:screen;opacity:.35;pointer-events:none;
    background:radial-gradient(38% 36% at 44% 40%, rgba(255,255,255,.5), transparent 60%);}
  .note{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:#55606e;z-index:5;}
  /* ---- низ ---- */
  .phase{text-align:center;margin-top:2px;}
  .phase .ph{font-size:18px;font-weight:600;}
  .phase .sec{font-size:64px;font-weight:300;line-height:1;margin:4px 0 2px;font-variant-numeric:tabular-nums;}
  .phase .hint{font-size:13px;color:var(--muted);}
  .round{margin:14px auto 0;font-size:13px;color:var(--muted);text-align:center;}
  .scenarios{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
  .scn{padding:9px 4px;border-radius:13px;border:1px solid var(--bd);background:var(--panel);
    color:var(--muted);font-size:12px;text-align:center;}
  .scn.active{color:var(--text);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07);}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="iconbtn">‹</div>
    <div class="title"><h1 id="scnName">Собраться</h1><div class="pattern" id="pattern">4 · 2 · 4</div></div>
    <div class="iconbtn">⋯</div>
  </div>
  <div class="timer"><div class="t" id="remain">2:00</div><div class="l">осталось</div></div>

  <div class="stage">
    <div class="breath" id="breath">
      <div class="glow" id="glow"></div>
      <video class="orb" id="orb" loop muted playsinline></video>
      <div class="placeholder" id="ph"></div>
      <div class="tint" id="tint"></div>
      <div class="sheen"></div>
    </div>
    <div class="note" id="note">плейсхолдер · положи рядом orb.webm (серый орб на чёрном) — подхватится автоматически</div>
  </div>

  <div class="phase">
    <div class="ph" id="phaseLabel">Вдох</div>
    <div class="sec" id="secNum">4</div>
    <div class="hint" id="hint">через нос</div>
  </div>
  <div class="round" id="round">цикл 1 / 6</div>
  <div class="scenarios" id="scenarios"></div>
</div>

<script>
/* ============================================================
   Aire — план B: пререндер-петля.
   Один НЕЙТРАЛЬНЫЙ (серый) орб-луп перекрашивается под состояние
   (blend-mode: color) + свечение. Дыхание = scale + brightness.
   ============================================================ */
const SC={
 focus:{name:"Собраться",pattern:[4,2,4],rounds:6,speed:1.0,color:"#2fd6c4",dim:1.0},
 calm:{name:"Успокоиться",pattern:[4,0,6],rounds:6,speed:1.3,color:"#4f93e6",dim:1.0},
 sleep:{name:"Уснуть",pattern:[4,7,8],rounds:5,speed:0.55,color:"#e0a85a",dim:0.8},
 restore:{name:"Восстановиться",pattern:[5,1,5],rounds:6,speed:0.85,color:"#5fcf9e",dim:0.92},
};
const ORDER=["focus","calm","sleep","restore"];
const PH=["inhale","hold","exhale"],PH_RU={inhale:"Вдох",hold:"Пауза",exhale:"Выдох"};
const HINTS={inhale:"через нос",hold:"удержи мягко",exhale:"медленно, расслабь плечи"};
let key="focus",start=performance.now();
const $=id=>document.getElementById(id);

/* видео-петля, если файл есть рядом */
const orb=$("orb");
orb.src="orb.webm";
let hasVideo=false;
orb.addEventListener('loadeddata',()=>{hasVideo=true;$("ph").style.display="none";
  $("note").textContent="orb.webm подключён";orb.play().catch(()=>{});});
orb.addEventListener('error',()=>{orb.style.display="none";});

/* табы */
const wrap=$("scenarios");
ORDER.forEach(k=>{const b=document.createElement('div');b.className='scn'+(k===key?' active':'');
  b.textContent=SC[k].name;b.onclick=()=>{key=k;[...wrap.children].forEach(e=>e.classList.remove('active'));
  b.classList.add('active');apply();start=performance.now();};wrap.appendChild(b);});
function apply(){const s=SC[key];$("scnName").textContent=s.name;$("pattern").textContent=s.pattern.join(" · ");
  $("tint").style.background=s.color;
  $("glow").style.background="radial-gradient(circle,"+s.color+" 0%,transparent 70%)";
  if(hasVideo) orb.playbackRate=Math.min(2,Math.max(0.4,s.speed));}
apply();

const lerp=(a,b,t)=>a+(b-a)*t,easeIO=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function cycle(now){const s=SC[key],d=s.pattern,len=d[0]+d[1]+d[2],total=len*s.rounds;
  let el=((now-start)/1000)%total,ri=Math.floor(((now-start)/1000)/len)%s.rounds,ti=el%len,ph,pd,pe;
  if(ti<d[0]){ph=0;pd=d[0];pe=ti;}else if(ti<d[0]+d[1]){ph=1;pd=d[1];pe=ti-d[0];}else{ph=2;pd=d[2];pe=ti-d[0]-d[1];}
  return {ph,p:pd>0?pe/pd:1,pd,pe,ri,rounds:s.rounds,remain:total-el};}

const breath=$("breath");
function frame(now){
  const s=SC[key],ci=cycle(now);
  let scale,bright;
  if(ci.ph===0){const e=easeIO(ci.p);scale=lerp(0.92,1.12,e);bright=lerp(0.78,1.08,e);}
  else if(ci.ph===1){scale=1.12;bright=1.08;}
  else{const e=easeIO(ci.p);scale=lerp(1.12,0.92,e);bright=lerp(1.08,0.74,e);}
  bright*=s.dim;
  breath.style.transform=`scale(${scale.toFixed(3)})`;
  breath.style.filter=`brightness(${bright.toFixed(2)})`;
  $("glow").style.opacity=(0.22+0.4*(bright)).toFixed(2);
  // текст
  $("phaseLabel").textContent=PH_RU[PH[ci.ph]];
  $("hint").textContent=HINTS[PH[ci.ph]];
  $("secNum").textContent=ci.pd>0?Math.max(1,Math.ceil(ci.pd-ci.pe)):"—";
  $("round").textContent=`цикл ${ci.ri+1} / ${ci.rounds}`;
  const m=Math.floor(ci.remain/60),sec=Math.floor(ci.remain%60);
  $("remain").textContent=`${m}:${sec<10?'0':''}${sec}`;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
