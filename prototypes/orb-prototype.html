<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Aire — прототип орба</title>
<style>
  :root{
    --bg:#05070d;
    --panel:rgba(255,255,255,.04);
    --panel-border:rgba(255,255,255,.08);
    --text:#e8eef5;
    --muted:#7d8896;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:
     radial-gradient(120% 90% at 50% 8%, #0a1424 0%, #05070d 60%, #03040a 100%);
     color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .app{max-width:430px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
       padding:18px 20px 22px;}
  /* ---- header ---- */
  .top{display:flex;align-items:center;justify-content:space-between;}
  .iconbtn{width:44px;height:44px;border-radius:50%;border:1px solid var(--panel-border);
    background:var(--panel);color:var(--text);font-size:18px;display:grid;place-items:center;cursor:pointer;}
  .title{text-align:center;}
  .title h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.2px;}
  .pattern{margin-top:3px;font-size:14px;color:var(--muted);letter-spacing:3px;}
  .timer{margin:16px auto 0;display:flex;flex-direction:column;align-items:center;
    padding:8px 18px;border:1px solid var(--panel-border);background:var(--panel);border-radius:16px;}
  .timer .t{font-size:18px;font-variant-numeric:tabular-nums;}
  .timer .l{font-size:11px;color:var(--muted);margin-top:1px;}
  /* ---- stage ---- */
  .stage{position:relative;flex:1;display:grid;place-items:center;min-height:300px;margin:6px 0;}
  .glow{position:absolute;width:78%;aspect-ratio:1;border-radius:50%;filter:blur(34px);
    opacity:.55;transition:none;pointer-events:none;}
  svg{width:100%;max-width:340px;display:block;overflow:visible;}
  /* ---- phase readout ---- */
  .phase{text-align:center;margin-top:2px;}
  .phase .ph{font-size:18px;font-weight:600;letter-spacing:.5px;}
  .phase .sec{font-size:64px;font-weight:300;line-height:1;margin:4px 0 2px;font-variant-numeric:tabular-nums;}
  .phase .hint{font-size:13px;color:var(--muted);}
  .round{margin:14px auto 0;font-size:13px;color:var(--muted);}
  /* ---- scenario tabs ---- */
  .scenarios{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
  .scn{padding:9px 4px;border-radius:13px;border:1px solid var(--panel-border);background:var(--panel);
    color:var(--muted);font-size:12px;cursor:pointer;text-align:center;transition:all .25s;}
  .scn.active{color:var(--text);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07);}
  /* ---- tuning ---- */
  details{margin-top:14px;border:1px solid var(--panel-border);border-radius:14px;background:var(--panel);}
  summary{padding:11px 14px;cursor:pointer;font-size:13px;color:var(--muted);list-style:none;}
  summary::-webkit-details-marker{display:none;}
  .sliders{padding:4px 14px 14px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
  .row label{width:96px;flex:none;}
  .row input[type=range]{flex:1;accent-color:#46d6c4;}
  .row .val{width:38px;text-align:right;color:var(--text);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="iconbtn">‹</div>
    <div class="title"><h1 id="scnName">Собраться</h1><div class="pattern" id="pattern">4 · 2 · 4</div></div>
    <div class="iconbtn">⋯</div>
  </div>

  <div class="timer"><div class="t" id="remain">2:00</div><div class="l">осталось</div></div>

  <div class="stage">
    <div class="glow" id="glow"></div>
    <svg id="svg" viewBox="-160 -160 320 320">
      <defs>
        <radialGradient id="fill" cx="42%" cy="38%" r="72%">
          <stop offset="0%"  id="f0"/>
          <stop offset="55%" id="f1"/>
          <stop offset="100%" id="f2"/>
        </radialGradient>
        <radialGradient id="core" cx="44%" cy="40%" r="55%">
          <stop offset="0%"  id="c0"/>
          <stop offset="100%" id="c1"/>
        </radialGradient>
        <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
      </defs>
      <path id="rim"  filter="url(#soft)" fill="none" stroke-width="3"/>
      <path id="blob" fill="url(#fill)"/>
      <path id="coreBlob" fill="url(#core)" opacity=".9"/>
      <path id="wave1" fill="none" stroke-width="1.4" opacity=".5"/>
      <path id="wave2" fill="none" stroke-width="1.1" opacity=".35"/>
    </svg>
  </div>

  <div class="phase">
    <div class="ph" id="phaseLabel">Вдох</div>
    <div class="sec" id="secNum">4</div>
    <div class="hint" id="hint">через нос</div>
  </div>
  <div class="round" id="round">цикл 1 / 6</div>

  <div class="scenarios" id="scenarios"></div>

  <details>
    <summary>⚙︎ Тонкая настройка (подбор формы)</summary>
    <div class="sliders">
      <div class="row"><label>Амплитуда формы</label><input id="sAmp" type="range" min="0" max="100" value="50"><span class="val" id="vAmp">—</span></div>
      <div class="row"><label>Скорость движения</label><input id="sSpeed" type="range" min="0" max="100" value="50"><span class="val" id="vSpeed">—</span></div>
      <div class="row"><label>Свечение</label><input id="sGlow" type="range" min="0" max="100" value="50"><span class="val" id="vGlow">—</span></div>
      <div class="row"><label>Кол-во точек</label><input id="sPts" type="range" min="6" max="16" value="10"><span class="val" id="vPts">10</span></div>
    </div>
  </details>
</div>

<script>
/* =====================================================================
   Aire — полуживой орб. Полностью детерминированная анимация.
   Управляется: сценарием, фазой дыхания и прогрессом фазы (0..1).
   НИКАКИХ датчиков/микрофона — форма считается из времени и сценария.
   ===================================================================== */

const TAU = Math.PI*2;
const lerp=(a,b,t)=>a+(b-a)*t;
const easeInOut=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

/* --- Сценарии: цвет, скорость, "хаотичность", паттерн дыхания --- */
const SCENARIOS = {
  focus:{
    name:"Собраться",
    pattern:[4,2,4],            // вдох · пауза · выдох (сек)
    rounds:6,
    speed:0.9, amp:0.6,         // собранно, почти симметрично
    chaos:0.25,                 // мало хаоса
    fill:["#d6fbff","#46d6c4","#0c4f54"],
    core:["#eaffff","#36b8ac"],
    rim:"#5ff0e0", glow:"#1fb9aa",
    dim:1.0
  },
  calm:{
    name:"Успокоиться",
    pattern:[4,0,6],
    rounds:6,
    speed:1.25, amp:0.95,       // движение быстрее, край живее
    chaos:0.7,
    fill:["#dff0ff","#5aa8f5","#0f3a66"],
    core:["#f0f8ff","#4f93e6"],
    rim:"#7cc2ff", glow:"#2f7fd6",
    dim:1.0
  },
  sleep:{
    name:"Уснуть",
    pattern:[4,7,8],
    rounds:5,
    speed:0.45, amp:0.6,        // самое медленное и плавное
    chaos:0.3,
    fill:["#ffe9c2","#e0a85a","#5a3712"],
    core:["#fff2d6","#d49a4e"],
    rim:"#f2c987", glow:"#caa15a",
    dim:0.72                    // приглушённее
  },
  restore:{
    name:"Восстановиться",
    pattern:[5,1,5],
    rounds:6,
    speed:0.8, amp:0.75,        // мягкое объёмное движение
    chaos:0.45,
    fill:["#d9fff0","#5fcf9e","#5a5024"],   // между teal и тёплым золотом
    core:["#eafff6","#7fd6b4"],
    rim:"#8fe6c4", glow:"#5cae8f",
    dim:0.92
  }
};
const ORDER=["focus","calm","sleep","restore"];
const PHASES=["inhale","hold","exhale"];
const PHASE_RU={inhale:"Вдох",hold:"Пауза",exhale:"Выдох"};
const HINTS={inhale:"через нос",hold:"удержи мягко",exhale:"медленно, расслабь плечи"};

/* --- состояние --- */
let key="focus";
let user={amp:1,speed:1,glow:1,pts:10};

/* --- ползунки --- */
const $=id=>document.getElementById(id);
function bindSlider(id,valId,fmt,onset){
  const s=$(id),v=$(valId);
  const upd=()=>{const r=onset(+s.value);v.textContent=fmt(r);};
  s.addEventListener('input',upd);upd();
}
bindSlider('sAmp','vAmp',r=>r.toFixed(2)+'×',x=>user.amp=0.3+x/100*1.4);
bindSlider('sSpeed','vSpeed',r=>r.toFixed(2)+'×',x=>user.speed=0.3+x/100*1.7);
bindSlider('sGlow','vGlow',r=>r.toFixed(2)+'×',x=>user.glow=x/100*1.6);
bindSlider('sPts','vPts',r=>r,x=>user.pts=x);

/* --- табы сценариев --- */
const scnWrap=$("scenarios");
ORDER.forEach(k=>{
  const b=document.createElement('div');
  b.className='scn'+(k===key?' active':'');
  b.textContent=SCENARIOS[k].name;
  b.onclick=()=>{key=k;document.querySelectorAll('.scn').forEach(e=>e.classList.remove('active'));
    b.classList.add('active');applyScenario();start=performance.now();};
  scnWrap.appendChild(b);
});

function applyScenario(){
  const s=SCENARIOS[key];
  $("scnName").textContent=s.name;
  $("pattern").textContent=s.pattern.join(" · ");
  // градиенты
  $("f0").setAttribute("stop-color",s.fill[0]);
  $("f1").setAttribute("stop-color",s.fill[1]);
  $("f2").setAttribute("stop-color",s.fill[2]);
  $("c0").setAttribute("stop-color",s.core[0]);
  $("c1").setAttribute("stop-color",s.core[1]); $("c1").setAttribute("stop-opacity","0");
  $("rim").setAttribute("stroke",s.rim);
  $("wave1").setAttribute("stroke",s.core[1]);
  $("wave2").setAttribute("stroke",s.rim);
  $("glow").style.background="radial-gradient(circle,"+s.glow+" 0%,transparent 70%)";
}
applyScenario();

/* --- путь блоба: замкнутый Catmull-Rom -> Безье (всегда гладкий) --- */
function blobPath(pts){
  const n=pts.length;let d="";
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=(i===0?`M${p1[0].toFixed(2)},${p1[1].toFixed(2)}`:"")+
       ` C${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)}`;
  }
  return d+"Z";
}

/* --- генерация точек: радиус = база + сумма низкочастотных синусов --- */
function makePoints(t,R,ampMul,n){
  const s=SCENARIOS[key];
  const amp=s.amp*ampMul*user.amp*0.16;     // итоговая амплитуда деформации
  const chaos=s.chaos;
  const pts=[];
  for(let i=0;i<n;i++){
    const a=i/n*TAU;
    const f=1+amp*(
        0.6*Math.sin(t*0.9 + i*1.7) +
        0.4*Math.sin(t*1.3 + i*2.3 + chaos*3) +
        chaos*0.5*Math.sin(t*2.1 - i*1.1)
      );
    pts.push([Math.cos(a)*R*f, Math.sin(a)*R*f]);
  }
  return pts;
}

/* --- дыхательный цикл --- */
let start=performance.now();
function cycleInfo(now){
  const s=SCENARIOS[key];
  const dur=s.pattern.map(x=>x);                 // sec
  const cycleLen=dur[0]+dur[1]+dur[2];
  const totalLen=cycleLen*s.rounds;
  let el=((now-start)/1000)%totalLen;
  const roundIdx=Math.floor(((now-start)/1000)/cycleLen)%s.rounds;
  let tIn=el%cycleLen;
  let phase,pdur,pelapsed;
  if(tIn<dur[0]){phase=0;pdur=dur[0];pelapsed=tIn;}
  else if(tIn<dur[0]+dur[1]){phase=1;pdur=dur[1];pelapsed=tIn-dur[0];}
  else{phase=2;pdur=dur[2];pelapsed=tIn-dur[0]-dur[1];}
  const p= pdur>0? pelapsed/pdur : 1;
  const remainTotal=totalLen-el;
  return {phase,p,pdur,pelapsed,roundIdx,cycleLen,remainTotal,rounds:s.rounds};
}

/* --- основной рендер --- */
const elGlow=$("glow");
let phaseSeed=0, lastPhase=-1;

function frame(now){
  const s=SCENARIOS[key];
  const ci=cycleInfo(now);
  const ph=PHASES[ci.phase];
  const t=(now/1000)*s.speed*user.speed;

  /* масштаб дыхания: вдох расширяет, выдох сжимает, пауза удерживает */
  let scale, brightness, ampMul;
  if(ci.phase===0){               // вдох
    const e=easeInOut(ci.p);
    scale=lerp(0.92,1.12,e); brightness=lerp(0.7,1.0,e); ampMul=1.0;
  }else if(ci.phase===1){         // пауза — почти замирает
    scale=1.12+0.006*Math.sin(t*2); brightness=1.0; ampMul=0.45;
  }else{                          // выдох — сжимается и становится ровнее
    const e=easeInOut(ci.p);
    scale=lerp(1.12,0.92,e); brightness=lerp(1.0,0.62,e); ampMul=lerp(1.0,0.4,e);
  }
  brightness*=s.dim;

  const R=110*scale;
  const n=Math.round(user.pts);
  const pts=makePoints(t,R,ampMul,n);
  $("blob").setAttribute("d",blobPath(pts));

  // ядро (чуть меньше, ярче)
  const corePts=makePoints(t*1.1+10,R*0.62,ampMul*0.8,n);
  $("coreBlob").setAttribute("d",blobPath(corePts));
  $("coreBlob").setAttribute("opacity",(0.55+0.4*brightness).toFixed(2));

  // ободок-свечение
  $("rim").setAttribute("d",blobPath(pts));
  $("rim").setAttribute("opacity",(0.35*brightness*(0.5+user.glow)).toFixed(2));

  // внутренние «волны» — намёк на живую энергию
  const w1=makePoints(t*0.7+3,R*0.78,ampMul,n);
  const w2=makePoints(-t*0.6+7,R*0.5,ampMul,n);
  $("wave1").setAttribute("d",blobPath(w1));
  $("wave2").setAttribute("d",blobPath(w2));
  $("wave1").setAttribute("opacity",(0.25*brightness).toFixed(2));
  $("wave2").setAttribute("opacity",(0.18*brightness).toFixed(2));

  // фоновое свечение
  elGlow.style.transform=`scale(${(scale*1.05).toFixed(3)})`;
  elGlow.style.opacity=(0.25+0.5*brightness*user.glow).toFixed(2);

  // текст
  $("phaseLabel").textContent=PHASE_RU[ph];
  $("hint").textContent=HINTS[ph];
  const secLeft=Math.max(1,Math.ceil(ci.pdur-ci.pelapsed));
  $("secNum").textContent= ci.pdur>0? secLeft : "—";
  $("round").textContent=`цикл ${ci.roundIdx+1} / ${ci.rounds}`;
  const m=Math.floor(ci.remainTotal/60), sec=Math.floor(ci.remainTotal%60);
  $("remain").textContent=`${m}:${sec<10?'0':''}${sec}`;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
